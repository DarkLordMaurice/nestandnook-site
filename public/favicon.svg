<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Art deco emblem: sunburst rays + double gold ring around a serif
       ampersand, on a near-black jewel-teal ground. Replaces the earlier
       tape-measure/nest concept — dropped per brand direction: dark, fancy,
       typographic-led art deco instead of an illustrated motif. -->
  <defs>
    <linearGradient id="goldg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0d878"/>
      <stop offset="55%" stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#9c7d18"/>
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="#0d1f1d"/>
  <circle cx="150" cy="150" r="132" fill="none" stroke="url(#goldg)" stroke-width="2.5"/>
  <circle cx="150" cy="150" r="120" fill="none" stroke="url(#goldg)" stroke-width="1.5"/>
  <g stroke="url(#goldg)" stroke-width="3" stroke-linecap="round">
    <line x1="150" y1="40" x2="150" y2="16"/>
    <line x1="184" y1="46" x2="196" y2="24"/>
    <line x1="116" y1="46" x2="104" y2="24"/>
    <line x1="212" y1="64" x2="230" y2="46"/>
    <line x1="88" y1="64" x2="70" y2="46"/>
  </g>
  <g stroke="url(#goldg)" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <line x1="150" y1="260" x2="150" y2="282"/>
    <line x1="184" y1="254" x2="196" y2="272"/>
    <line x1="116" y1="254" x2="104" y2="272"/>
  </g>
  <g fill="url(#goldg)">
    <rect x="44" y="146" width="9" height="9" transform="rotate(45 48.5 150.5)"/>
    <rect x="247" y="146" width="9" height="9" transform="rotate(45 251.5 150.5)"/>
  </g>
  <line x1="66" y1="150" x2="108" y2="150" stroke="url(#goldg)" stroke-width="2"/>
  <line x1="192" y1="150" x2="234" y2="150" stroke="url(#goldg)" stroke-width="2"/>
  <text x="150" y="196" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="150" text-anchor="middle" fill="url(#goldg)">&amp;</text>
</svg>

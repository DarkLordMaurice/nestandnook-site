<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- Art Deco corner ornament — nested sunrise arches radiating from the
       corner point (0,0) plus a diamond finial on the diagonal. Hand-built
       vector, not a generated photo, so it's naturally transparent and
       reusable for any of the 4 tool panels at any size. Mirror with
       CSS transform: scaleX(-1) for the opposite corner. -->
  <circle cx="0" cy="0" r="52" fill="none" stroke="#123a37" stroke-width="11" />
  <circle cx="0" cy="0" r="37" fill="none" stroke="#c9a227" stroke-width="5" />
  <circle cx="0" cy="0" r="26" fill="none" stroke="#c1602e" stroke-width="7" />
  <circle cx="0" cy="0" r="15" fill="none" stroke="#e6c757" stroke-width="3" />
  <rect x="61" y="61" width="14" height="14" fill="#c9a227" stroke="#123a37" stroke-width="2" transform="rotate(45 68 68)" />
</svg>
